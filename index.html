function getDayIndex(){
  const start = new Date(2026, 6, 15);
  const today = new Date();
  today.setHours(0,0,0,0);
  start.setHours(0,0,0,0);
  let diff = Math.floor((today - start) / (1000*60*60*24));
  if(diff < 0) diff = 0;
  if(diff >= QUIZ_21.length) diff = diff % QUIZ_21.length;
  return diff;
}

function todayStr(){
  return new Date().toISOString().slice(0,10);
}
function alreadyPlayed(){
  return localStorage.getItem('quiz_played_'+todayStr()) !== null;
}
function markPlayed(){
  localStorage.setItem('quiz_played_'+todayStr(),'1');
}

function startQuiz(){
  userName = document.getElementById('nameInput').value.trim();
  if(!userName){ alert('ദയവായി പേര് എഴുതൂ / Please enter name'); return; }
  if(alreadyPlayed()){
    document.getElementById('app').innerHTML = '<div class="result"><h2>🙏 നിങ്ങൾ ഇന്ന് കളിച്ചു കഴിഞ്ഞു!</h2><p style="margin:15px 0">1 ദിവസം 1 അവസരം മാത്രം.<br>നാളെ വീണ്ടും വരൂ!</p><button class="btn" onclick="location.reload()">OK</button></div>';
    return;
  }
  currentDay = getDayIndex();
  currentQ = QUIZ_21[currentDay];
  document.getElementById('dayBadge').innerText = 'Day ' + (currentDay+1) + ' / 21';
  showQuestion();
}

function showQuestion(){
  selected = -1;
  let q = currentQ;
  let html = '<div class="question-box">'+q.q+'</div><div class="options">';
  q.options.forEach((opt,i)=>{
    html += '<div class="opt" id="opt'+i+'" onclick="selectOpt('+i+')">'+String.fromCharCode(65+i)+'. '+opt+'</div>';
  });
  html += '</div><button class="btn" id="submitBtn" onclick="submitAns()" disabled>Submit Answer</button>';
  document.getElementById('app').innerHTML = html;
}

function selectOpt(i){
  selected = i;
  document.querySelectorAll('.opt').forEach(el=>el.classList.remove('selected'));
  document.getElementById('opt'+i).classList.add('selected');
  document.getElementById('submitBtn').disabled = false;
}

function submitAns(){
  if(selected < 0) return;
  let q = currentQ;
  let isCorrect = selected === q.correct;
  
  document.querySelectorAll('.opt').forEach(el=>el.style.pointerEvents='none');
  let btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerText = 'Checking...';

  // 1st sec: full fill
  if(isCorrect){
    document.getElementById('opt'+selected).classList.add('correct-fill');
  } else {
    document.getElementById('opt'+selected).classList.add('wrong-fill');
    document.getElementById('opt'+q.correct).classList.add('correct-fill');
  }

  setTimeout(()=>{
    // After 1 sec: outline only
    document.querySelectorAll('.opt').forEach(el=>{
      el.classList.remove('correct-fill','wrong-fill');
    });
    if(isCorrect){
      document.getElementById('opt'+selected).classList.add('correct-outline');
    } else {
      document.getElementById('opt'+selected).classList.add('wrong-outline');
      document.getElementById('opt'+q.correct).classList.add('correct-outline');
    }
    // Show correct for 1 sec only, then remove all colors before showing result
    setTimeout(()=>{
      document.querySelectorAll('.opt').forEach(el=>{
        el.classList.remove('correct-outline','wrong-outline','correct-fill','wrong-fill');
      });
      showResult(isCorrect);
    }, 1000);
  }, 1000);
}


function generateCode(){
  const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ"; // No I,O to avoid confusion
  let code = "";
  for(let i=0;i<4;i++) code += letters.charAt(Math.floor(Math.random()*letters.length));
  return code;
}

function showResult(isCorrect){
  let now = new Date();
  let hour = now.getHours();
  let baseMark = isCorrect ? 2 : 0;
  let bonusMark = (isCorrect && hour < 6) ? 2 : 0;
  let todayMark = baseMark + bonusMark;

  let totalMarks = parseInt(localStorage.getItem('quiz_total_marks')||'0') + todayMark;
  localStorage.setItem('quiz_total_marks', totalMarks);
  let totalPlayed = parseInt(localStorage.getItem('quiz_total_played')||'0')+1;
  localStorage.setItem('quiz_total_played', totalPlayed);
  let totalCorrect = parseInt(localStorage.getItem('quiz_total_correct')||'0');
  if(isCorrect) totalCorrect++;
  localStorage.setItem('quiz_total_correct', totalCorrect);
  markPlayed();

  let bonusText = bonusMark>0 ? '<br>🌅 Early Bird Bonus (Before 6 AM): +2' : '';
  let msg = isCorrect ? '✅ ശരി! ദൈവം അനുഗ്രഹിക്കട്ടെ!' : '❌ തെറ്റ്! ശരിയായ ഉത്തരം: ' + currentQ.options[currentQ.correct];

  // Generate code only for winners
  let code = "";
  let codeSection = "";
  if(isCorrect){
    code = generateCode() + (currentDay+1); // 4 letters + day for tracking e.g., ABCK2
    let displayCode = code.substring(0,4); // Show only 4 letters to user
    // Store full code for sheet
    window._winnerCode = code;
    codeSection = `
      <div id="codePopup" style="background:linear-gradient(135deg,#fff3cd,#ffe082);border:3px dashed #f5af19;padding:15px;border-radius:12px;margin:15px 0;animation:pop 0.5s ease">
        <p style="font-size:14px;color:#795548">🎉 You Won! Your Secret Code:</p>
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0">
          <span id="secretCode" style="font-size:32px;font-weight:900;letter-spacing:8px;color:#d32f2f;background:#fff;padding:8px 16px;border-radius:8px;border:2px solid #f5af19">${displayCode}</span>
          <button onclick="copyCode()" style="background:#4caf50;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer">Copy</button>
        </div>
        <p style="font-size:12px;color:#5d4037">📋 Copy this code and paste into the comment box</p>
      </div>
      <style>@keyframes pop{0%{transform:scale(0.8)}50%{transform:scale(1.1)}100%{transform:scale(1)}}</style>
    `;
  }

  document.getElementById('app').innerHTML = 
    '<div class="result">'+
    '<h2>'+(isCorrect?'🎉 അഭിനന്ദനങ്ങൾ!':'🙏 ശ്രമിച്ചതിന് നന്ദി!')+'</h2>'+
    '<p style="margin:10px 0;font-weight:600">'+msg+'</p>'+
    '<div style="background:#f8f9ff;padding:15px;border-radius:12px;margin:15px 0">'+
    '<p style="font-size:20px"><b>Today: '+todayMark+' Marks</b></p>'+
    '<p style="font-size:14px;margin-top:5px">'+(isCorrect?'Correct: 2 Marks':'Wrong: 0 Marks')+bonusText+'</p>'+
    '<p style="font-size:16px;margin-top:10px;background:#fff3cd;padding:6px;border-radius:8px">Total: <b>'+totalMarks+' Marks</b> | Days: '+totalPlayed+'</p>'+
    '</div>'+
    codeSection+
    '<button class="btn" onclick="showThanksPage('+isCorrect+','+todayMark+','+totalMarks+','+totalPlayed+')">'+(isCorrect?'Continue →':'Next →')+'</button>'+
    '</div>';

  // Save to Google Sheet with code
  try{
    fetch(SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      body: JSON.stringify({
        name: userName,
        place: document.getElementById('placeInput')?.value || '',
        day: currentDay+1,
        question: currentQ.q,
        answer: currentQ.options[selected],
        correct: isCorrect ? 'YES' : 'NO',
        marks: todayMark,
        bonus: bonusMark,
        time: now.toLocaleString(),
        code: isCorrect ? window._winnerCode : ''
      })
    });
  }catch(e){}
}

function copyCode(){
  let code = document.getElementById('secretCode').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    let btn = event.target;
    btn.innerText = 'Copied!';
    setTimeout(()=>btn.innerText='Copy',1500);
  });
}

function showThanksPage(isCorrect, todayMark, totalMarks, totalPlayed){
  let v = VERSES[currentDay % VERSES.length];
  document.getElementById('app').innerHTML = 
    '<div class="result">'+
    '<h2 style="font-size:22px">Thanks. Come back tomorrow 🙏</h2>'+
    '<p style="margin:15px 0;color:#666">നാളെ വീണ്ടും കാണാം! ദൈവം അനുഗ്രഹിക്കട്ടെ!</p>'+
    '<div style="background:linear-gradient(135deg,#e8f5e9,#f1f8e9);padding:16px;border-radius:12px;border-left:5px solid #00c853;margin:20px 0;text-align:left">'+
    '<p style="font-size:16px;font-style:italic;color:#2e7d32;line-height:1.6">\"'+v.text+'\"</p>'+
    '<p style="font-size:14px;font-weight:700;color:#1b5e20;margin-top:8px;text-align:right">- '+v.ref+'</p>'+
    '</div>'+
    '<p style="font-size:13px;color:#999;margin-top:20px">Your Score Today: <b>'+todayMark+' Marks</b> | Total: <b>'+totalMarks+'</b></p>'+
    '<button class="btn" onclick="location.reload()">Back to Home</button>'+
    '</div>';
}


(function(){
  let d = getDayIndex();
  document.getElementById('dayBadge').innerText = 'Day ' + (d+1) + ' / 21 - ' + new Date().toLocaleDateString('en-GB');
})();
</script>
